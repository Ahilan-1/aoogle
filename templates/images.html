<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if query %}{{ query }} - {% endif %}aoogle Images</title>
    <style>
        :root {
            --apple-gray: #86868b;
            --apple-light-gray: #f5f5f7;
            --apple-blue: #0066cc;
            --apple-dark: #1d1d1f;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        body {
            background: #fff;
            color: var(--apple-dark);
        }
        .header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.98);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--apple-dark);
            text-decoration: none;
            white-space: nowrap;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--apple-light-gray);
            border-radius: 12px;
            padding: 10px 16px;
            flex: 1;
            max-width: 640px;
            transition: all 0.3s;
        }
        .search-box:focus-within {
            background: #fff;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }
        .search-button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--apple-gray);
            padding: 0 4px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        .tab {
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            color: var(--apple-gray);
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab:hover {
            background: var(--apple-light-gray);
        }
        .tab.active {
            background: var(--apple-blue);
            color: #fff;
        }

        .images-grid {
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 16px;
            columns: 4;
            column-gap: 16px;
        }

        .image-card {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--apple-light-gray);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .image-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        .image-card img {
            width: 100%;
            display: block;
        }
        .image-card .info {
            padding: 10px 12px;
        }
        .image-card .info .title {
            font-size: 13px;
            font-weight: 500;
            color: var(--apple-dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .image-card .info .source {
            font-size: 12px;
            color: var(--apple-gray);
            margin-top: 2px;
        }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: var(--apple-gray);
            font-size: 18px;
        }

        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--apple-gray);
        }

        @media (max-width: 1024px) {
            .images-grid { columns: 3; }
        }
        @media (max-width: 768px) {
            .images-grid { columns: 2; }
            .header-inner { flex-wrap: wrap; }
            .tabs { margin-left: 0; }
        }
        @media (max-width: 480px) {
            .images-grid { columns: 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">aoogle</a>
            <form class="search-box" action="/images" method="GET">
                <input type="text" name="q" class="search-input" value="{{ query if query else '' }}" required autocomplete="off" placeholder="Search images...">
                <button type="submit" class="search-button">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </form>
            <div class="tabs">
                <a href="/search?q={{ query }}" class="tab">Web</a>
                <a href="/images?q={{ query }}" class="tab active">Images</a>
            </div>
        </div>
    </header>

    <main>
        {% if error %}
            <div class="error-message">
                <h3>{{ error }}</h3>
            </div>
        {% endif %}

        {% if images %}
            <div class="images-grid">
                {% for img in images %}
                    <div class="image-card" onclick="window.open('{{ img.source_url }}', '_blank')">
                        <img src="{{ img.thumbnail }}" alt="{{ img.title }}" loading="lazy">
                        <div class="info">
                            <div class="title">{{ img.title }}</div>
                            <div class="source">{{ img.source_domain }}</div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% elif query and not error %}
            <div class="no-results">
                <p>No images found for "{{ query }}"</p>
            </div>
        {% endif %}
    </main>
</body>
</html>
