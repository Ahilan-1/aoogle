<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if query %}{{ query }} - {% endif %}aoogle Images</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4285f4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --apple-gray: #86868b;
            --apple-light-gray: #f5f5f7;
            --apple-blue: #0066cc;
            --apple-dark: #1d1d1f;
            --border: #d2d2d7;
            --hover-bg: #e8e8ed;
        }
        .dark-mode {
            --apple-gray: #a1a1a6;
            --apple-light-gray: #2c2c2e;
            --apple-blue: #64a8ff;
            --apple-dark: #f5f5f7;
            --border: #48484a;
            --hover-bg: #3a3a3c;
            background: #1c1c1e;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        body {
            background: #fff;
            color: var(--apple-dark);
            transition: background .2s, color .2s;
        }
        .header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.98);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.08);
        }
        .dark-mode .header { background: rgba(28, 28, 30, 0.98); }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--apple-dark);
            text-decoration: none;
            white-space: nowrap;
        }
        .logo:hover { text-decoration: none; }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--apple-light-gray);
            border-radius: 12px;
            padding: 10px 16px;
            flex: 1;
            max-width: 520px;
            transition: all 0.3s;
        }
        .search-box:focus-within {
            background: var(--bg);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background: transparent;
            color: inherit;
        }
        .search-button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--apple-gray);
            padding: 0 4px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        .tab {
            padding: 7px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            color: var(--apple-gray);
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab:hover { background: var(--apple-light-gray); text-decoration: none; }
        .tab.active { background: var(--apple-blue); color: #fff; }

        .images-grid {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 16px;
            columns: 5;
            column-gap: 12px;
        }
        @media (max-width: 1200px) { .images-grid { columns: 4; } }
        @media (max-width: 900px) { .images-grid { columns: 3; } }
        @media (max-width: 640px) { .images-grid { columns: 2; } }
        @media (max-width: 400px) { .images-grid { columns: 1; } }

        .image-card {
            break-inside: avoid;
            margin-bottom: 12px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--apple-light-gray);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .image-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        .image-card img {
            width: 100%;
            display: block;
        }
        .image-card .info {
            padding: 8px 10px;
        }
        .image-card .info .title {
            font-size: 12px;
            font-weight: 500;
            color: var(--apple-dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .image-card .info .source {
            font-size: 11px;
            color: var(--apple-gray);
            margin-top: 2px;
        }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: var(--apple-gray);
            font-size: 18px;
        }
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--apple-gray);
        }

        .dm-toggle {
            position: fixed; top: 14px; right: 16px; z-index: 999;
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--apple-gray); cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; transition: .15s;
        }
        .dm-toggle:hover { background: var(--hover-bg); }
    </style>
</head>
<body>
    <button class="dm-toggle" id="dm-btn" onclick="toggleDark()" aria-label="Toggle dark mode">&#x263D;</button>

    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">aoogle</a>
            <form class="search-box" action="/images" method="GET">
                <input type="text" name="q" class="search-input" value="{{ query if query else '' }}" required autocomplete="off" placeholder="Search images...">
                <button type="submit" class="search-button">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </form>
            <div class="tabs">
                <a href="/search?q={{ query }}" class="tab">Web</a>
                <a href="/images?q={{ query }}" class="tab active">Images</a>
                <a href="/videos?q={{ query }}" class="tab">Videos</a>
            </div>
        </div>
    </header>

    <main>
        {% if error %}
            <div class="error-message">
                <h3>{{ error }}</h3>
            </div>
        {% endif %}

        {% if images %}
            <div class="images-grid">
                {% for img in images %}
                    <div class="image-card" onclick="window.open('{{ img.source_url }}', '_blank')">
                        <img src="{{ img.thumbnail }}" alt="{{ img.title }}" loading="lazy">
                        <div class="info">
                            <div class="title">{{ img.title }}</div>
                            <div class="source">{{ img.source_domain }}</div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% elif query and not error %}
            <div class="no-results">
                <p>No images found for "{{ query }}"</p>
            </div>
        {% endif %}
    </main>

    <script>
        function setDark(v){
            document.body.classList.toggle('dark-mode',v);
            var b=document.getElementById('dm-btn');
            if(b)b.innerHTML=v?'&#x2600;':'&#x263D;';
            try{localStorage.setItem('aoogle-dark',v?'1':'0')}catch(e){}
        }
        function toggleDark(){setDark(!document.body.classList.contains('dark-mode'))}
        (function(){
            var p=null;try{p=localStorage.getItem('aoogle-dark')}catch(e){}
            if(p==='1')setDark(true);
            else if(p===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)setDark(true);
        })();
        if('serviceWorker'in navigator)navigator.serviceWorker.register('/static/sw.js');
    </script>
</body>
</html>
